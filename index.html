<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>En Manada</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <a href="./index.html"
        ><img src="./assets/img/logo.png" alt="logo-EnManada" class="logo"
      /></a>
      <nav class="menu">
        <input type="checkbox" id="toggle-menu" />
        <label for="toggle-menu" class="bars-menu">
          <span></span>
          <span></span>
          <span></span>
        </label>
        <ul class="navbar-list">
          <li><a href="" class="navbar-link">Inicio</a></li>
          <li><a href="" class="navbar-link">Productos</a></li>
          <li>
            <a href="" class="navbar-link">Contacto</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="hero">
        <div id="carouselExampleIndicators" class="carousel slide">
          <div class="carousel-indicators">
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="0"
              class="active"
              aria-current="true"
              aria-label="Slide 1"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="1"
              aria-label="Slide 2"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="2"
              aria-label="Slide 3"
            ></button>
          </div>
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="./assets/img/hero1.jpg"
                class="d-block w-100"
                alt="imagen-hero1"
              />
            </div>
            <div class="carousel-item">
              <img
                src="./assets/img/hero2.jpg"
                class="d-block w-100"
                alt="imagen-hero2"
              />
            </div>
            <div class="carousel-item">
              <img
                src="./assets/img/hero3.jpg"
                class="d-block w-100"
                alt="imagen-hero3"
              />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </section>
      <section class="CTA centradoFlex">
        <div class="card" style="width: 18rem">
          <img
            src="./assets/img/imagenCTA.jpg"
            class="card-img-top"
            alt="..."
          />
          <div class="card-body">
            <h5 class="card-title">Conoce nuestros productos</h5>
            <p class="card-text">Diseños exclusivos en hierro y madera.</p>
            <a href="#productos" class="btn-cta">Ver productos</a>
          </div>
        </div>
      </section>
      <section class="products" id="productos"></section>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
