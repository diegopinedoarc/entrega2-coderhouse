<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <a href="./index.html"
        ><img src="./assets/img/logo.png" alt="logo-EnManada" class="logo"
      /></a>
      <nav class="menu">
        <input type="checkbox" id="toggle-menu" />
        <label for="toggle-menu" class="bars-menu">
          <span></span>
          <span></span>
          <span></span>
        </label>
        <ul class="navbar-list">
          <li><a href="./index.html" class="navbar-link">Inicio</a></li>
          <li><a href="./products.html" class="navbar-link">Productos</a></li>
          <li>
            <a href="./contact.html" class="navbar-link">Contacto</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="contacto">
        <div class="contacto-container">
          <div class="contacto-info">
            <h2>Contacto</h2>
            <p>
              ¿Tenés alguna consulta o querés pedir un presupuesto? Escribinos y
              te respondemos a la brevedad.
            </p>

            <ul>
              <li>📍 Buenos Aires, Argentina</li>
              <li>📞 +54 9 11 1234 5678</li>
              <li>✉️ contacto@enmanada.com</li>
            </ul>

            <a href="https://wa.me/541112345678" class="btn-whatsapp"
              >Escribir por WhatsApp</a
            >
          </div>

          <form class="contacto-form">
            <input type="text" placeholder="Nombre" required />
            <input type="email" placeholder="Email" required />
            <textarea placeholder="Mensaje" rows="5" required></textarea>
            <button type="submit" class="btn-enviar">Enviar mensaje</button>
          </form>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
